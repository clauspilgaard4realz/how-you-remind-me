steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/dispatcher/Dockerfile
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/hyrm/reminder-dispatcher:latest
      - .
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/hyrm/reminder-dispatcher:latest
options:
  logging: CLOUD_LOGGING_ONLY
